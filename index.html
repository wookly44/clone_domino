<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino Pizza Clone Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --domino-red: #ff0000;
            --domino-blue: #0090e2;
            --domino-dark: #222;
        }
        body {margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') center center /cover;font-family:'Noto Sans KR', sans-serif;}
        /* 메인 컨테이너 */
        .container{text-align:center;background:white;padding:50px 80px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);border-top:8px solid var(--domino-red);transition: all 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);transform-origin:center;position:relative;z-index:100;}
        /* 도미노 로고 */
        .logo-box{margin-bottom:20px;}
        .domino-icon{display:inline-block;width:40px;height:40px;background:var(--domino-blue);transform:rotate(-10deg);margin-right:5px;border-radius:5px;position:relative;}
        .domino-icon.red{background:var(--domino-red);transform:rotate(10deg);}
        .domino-icon::after, .domino-icon.blue::before{content:'';display:block;width:12px;height:12px;background:#fff;border-radius:50%;position: absolute;}
        .domino-icon.red::after{top:50%;left:50%;transform:translate(-50%,-50%);}
        .domino-icon.blue::after{top:20%;left:20%;}
        .domino-icon.blue::before{bottom:20%;right:20%;}
        /* 타이틀 */
        h1{font-family:'Black Han Sans', sans-serif;font-size:3rem;color:var(--domino-dark);margin:10px 0;letter-spacing:-1px;}
        p{color:#666;margin-bottom:40px;font-size:1.1rem;}
        /* 페이지 버튼 */
        .btn-group{display:flex;gap:20px;justify-content:center;align-items:center;}
        .btn{text-decoration:none;padding:18px 40px;font-size:1.2rem;font-weight:bold;border-radius:50px;transition:all 0.3s ease;display:flex;align-items:center;gap:10px;}
        .btn-main{background-color:var(--domino-red);color:white;box-shadow:0 4px 15px rgba(227, 24, 55, 0.3);}
        .btn-faq{background-color:var(--domino-blue);color:white;box-shadow:0 4px 15px rgba(0, 120, 174, 0.3);}
        .btn:hover{transform:translateY(-5px);filter:brightness(1.1);}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <span class="domino-icon blue"></span>
            <span class="domino-icon red"></span>
        </div>

        <h1>DOMINO'S PIZZA</h1>
        <p>웹 퍼블리싱 클론 코딩 포트폴리오</p>
        
        <div class="btn-group">
            <a href="./main/main.html" class="btn btn-main">
                <span>🍕</span> 메인 페이지 보기
            </a>
            <a href="./faq/faq.html" class="btn btn-faq">
                <span>❓</span> 자주 묻는 질문
            </a>
        </div>
    </div>
</body>
</html>
